[cerebrium.deployment]
name = "unpod-voice-agent"
python_version = "3.12"
disable_auth = false
include = [
    'super/**',
    'super_services/**',
    'deployment/cerebrium/**',
    'pyproject.toml',
    '__init__.py',
    'requirements.txt',
]
exclude = [
    '.git/**',
    '.venv/**',
    'venv/**',
    '.claude/**',
    '__pycache__/**',
    '*.pyc',
    'tests/**',
    'docs/**',
    'logs/**',
    'scripts/**',
    'super_os/**',
    'superkik/**',
    'deployment/k8s/**',
    'deployment/services/**',
    '*.egg-info/**',
]

[cerebrium.hardware]
cpu = 4
memory = 8.0
compute = "CPU"
provider = "aws"
region = "us-east-1"

[cerebrium.scaling]
min_replicas = 1
max_replicas = 5
cooldown = 30
replica_concurrency = 1

[cerebrium.dependencies.apt]
gcc = "latest"
"g++" = "latest"
python3-dev = "latest"
libpq-dev = "latest"
git = "latest"
curl = "latest"
portaudio19-dev = "latest"
ffmpeg = "latest"
libsndfile1 = "latest"

[cerebrium.dependencies.paths]
pip = "requirements.txt"

[cerebrium.environment]
PYTHONPATH = "/cortex"
PYTHONUNBUFFERED = "1"
SETTINGS_FILE = "super_services.settings.prod"
HF_HOME = "/cortex/.hf_cache"

[cerebrium.build]
shell_commands = [
    "SKIP_DB_CHECK=1 python /cortex/super_services/orchestration/executors/voice_executor_v3.py download-files",
]

[cerebrium.runtime.custom]
entrypoint = ["python", "-u", "/cortex/super_services/orchestration/executors/voice_executor_v3.py", "start"]
port = 8600
healthcheck_endpoint = "/"
